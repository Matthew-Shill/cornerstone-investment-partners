<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="description"
      content="Browse available rental properties from Cornerstone Investment Partners."

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link

  <body class="site-body has-hero">
    <header id="site-header"></header>

        ></div>

          <p class="eyebrow">Listings</p>
          <h1>Available Rentals</h1>

      <section class="section">
        <div class="container" id="rentals-list">
          <!-- Populated by js/main.js from js/properties.js -->

      <section class="cta-band">

          <h2>Do not see what you are looking for?</h2>
          <p>Contact us — we are happy to answer questions about upcoming availability.</p>
          <a href="contact.html" class="btn btn-primary">Contact Us</a>

    <footer id="site-footer"></footer>

    <script src="js/site-config.js"></script>

    <script src="js/main.js"></script>
